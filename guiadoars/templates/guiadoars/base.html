{% load static %}

<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>GuiaDoar</title>

    <!-- Bootstrap -->
     <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" 
      rel="stylesheet">
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{% static 'guiadoars/css/style.css' %}" />

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  </head>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <body>
 <nav class="navbar navbar-expand-lg navbar-custom px-4">

  <div class="container">

    <!-- LOGO + NOME -->
    <a class="navbar-brand d-flex align-items-center" href="/">
      <img src="{% static 'guiadoars/images/logo.jpg.png' %}" alt="logo" class="logo me-2">
      <span class="brand-name">GuiaDoar</span>
    </a>

    <!-- BOTÃO MOBILE -->
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- MENU -->
    <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
      <ul class="navbar-nav align-items-center">

        <li class="nav-item">
          <a class="nav-link" href="/">Home</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="/instituicoes">Instituições</a>
        </li>

        <li class="nav-item">
          <a class="nav-link btn btn-success text-white px-3 ms-2" href="{% url 'sugerir_instituicao' %}">
            <i class="bi bi-plus-circle me-1"></i>Sugerir instituição
          </a>
        </li>

      </ul>
    </div>

  </div>
</nav>

    <div class="container mt-4">{% block content %} {% endblock %}</div>
    <footer class="bg-dark text-light mt-5 p-4">
      <div class="container text-center">
        <h5>GuiaDoar</h5>

        <p class="mb-0">
          Conectando pessoas que querem ajudar com instituições que precisam.
        </p>

        <p class="mb-0">© 2026 GuiaDoar</p>
      </div>
    </footer>
 <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  </body>
</html>
